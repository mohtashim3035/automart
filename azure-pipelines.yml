trigger:
  branches:
    include:
      - main

stages:

  # STAGE 1: BUILD & TEST
  - stage: BuildAndTest
    displayName: 'Stage 1 - Build and Test'
    jobs:
      - job: BuildAll
        displayName: 'Install Dependencies and Build'
        pool:
          name: Default
          demands:
            - agent.name -equals automart-vm-agent
        steps:
          - checkout: self

          - script: |
              echo "Node version:"
              node --version
              echo "npm version:"
              npm --version
            displayName: 'Check Node.js version'

          - script: |
              set -e
              echo "Installing product-service..."
              cd services/product-service && npm ci && cd ../..
              echo "Installing order-service..."
              cd services/order-service && npm ci && cd ../..
              echo "Installing inventory-service..."
              cd services/inventory-service && npm ci && cd ../..
              echo "Installing user-service..."
              cd services/user-service && npm ci && cd ../..
              echo "Installing payment-service..."
              cd services/payment-service && npm ci && cd ../..
              echo "Installing listing-service..."
              cd services/listing-service && npm ci && cd ../..
              echo "Building frontend..."
              cd frontend && npm ci && npm run build
              echo "All builds and tests passed!"
            displayName: 'Install All Dependencies and Build Frontend'

          - script: |
              echo "Verifying project structure..."
              test -f services/product-service/server.js   && echo "product-service OK"
              test -f services/order-service/server.js     && echo "order-service OK"
              test -f services/inventory-service/server.js && echo "inventory-service OK"
              test -f services/user-service/server.js      && echo "user-service OK"
              test -f services/payment-service/server.js   && echo "payment-service OK"
              test -f services/listing-service/server.js   && echo "listing-service OK"
              test -f frontend/src/App.jsx                 && echo "frontend OK"
              test -f docker-compose.yml                   && echo "docker-compose OK"
              test -f k8s/product-deployment.yaml          && echo "k8s configs OK"
              echo "All structure checks passed!"
            displayName: 'Verify Project Structure'

  # STAGE 2: DEPLOY
  - stage: Deploy
    displayName: 'Stage 2 - Deploy to Azure VM'
    dependsOn: BuildAndTest
    condition: succeeded()
    jobs:
      - deployment: DeployToVM
        displayName: 'Deploy with Docker Compose'
        pool:
          name: Default
          demands:
            - agent.name -equals automart-vm-agent
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    echo "Pulling latest code..."
                    cd ~/automart
                    git pull origin main
                    echo "Restarting services with Docker Compose..."
                    docker compose up --build -d
                    sleep 15
                    echo "Container status:"
                    docker compose ps
                  displayName: 'Pull Code and Redeploy'

                - script: |
                    echo "Running health checks..."
                    sleep 10
                    curl -sf http://localhost:3001/health && echo "product-service healthy" || echo "product-service check"
                    curl -sf http://localhost:3002/health && echo "order-service healthy"   || echo "order-service check"
                    curl -sf http://localhost:3003/health && echo "inventory-service healthy" || echo "inventory-service check"
                    curl -sf http://localhost:3004/health && echo "user-service healthy"    || echo "user-service check"
                    curl -sf http://localhost:3005/health && echo "payment-service healthy" || echo "payment-service check"
                    curl -sf http://localhost:3006/health && echo "listing-service healthy" || echo "listing-service check"
                    curl -sf http://localhost:80          && echo "frontend healthy"        || echo "frontend check"
                    echo "AutoMart deployed at http://20.55.249.106"
                  displayName: 'Health Check All Services'