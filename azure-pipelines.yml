trigger:
  branches:
    include:
      - main

variables:
  vmIP: '20.55.249.106'
  vmUser: 'azureuser'

stages:

  # STAGE 1: BUILD & TEST
  - stage: BuildAndTest
    displayName: 'Stage 1 - Build and Test'
    jobs:
      - job: BuildAll
        displayName: 'Install Dependencies and Build'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js 20'

          - script: |
              set -e
              echo "Installing product-service..."
              cd services/product-service && npm ci && cd ../..
              echo "Installing order-service..."
              cd services/order-service && npm ci && cd ../..
              echo "Installing inventory-service..."
              cd services/inventory-service && npm ci && cd ../..
              echo "Installing user-service..."
              cd services/user-service && npm ci && cd ../..
              echo "Installing payment-service..."
              cd services/payment-service && npm ci && cd ../..
              echo "Installing listing-service..."
              cd services/listing-service && npm ci && cd ../..
              echo "Building frontend..."
              cd frontend && npm ci && npm run build
              echo "All builds successful!"
            displayName: 'Install All Dependencies and Build Frontend'

          - script: |
              echo "Running health checks on code structure..."
              test -f services/product-service/server.js   && echo "product-service OK"
              test -f services/order-service/server.js     && echo "order-service OK"
              test -f services/inventory-service/server.js && echo "inventory-service OK"
              test -f services/user-service/server.js      && echo "user-service OK"
              test -f services/payment-service/server.js   && echo "payment-service OK"
              test -f services/listing-service/server.js   && echo "listing-service OK"
              test -f frontend/src/App.jsx                 && echo "frontend OK"
              test -f docker-compose.yml                   && echo "docker-compose OK"
              echo "All structure checks passed!"
            displayName: 'Verify Project Structure'

  # STAGE 2: DEPLOY TO AZURE VM
  - stage: DeployToAzureVM
    displayName: 'Stage 2 - Deploy to Azure VM'
    dependsOn: BuildAndTest
    condition: succeeded()
    jobs:
      - deployment: DeployViaSSH
        displayName: 'SSH Deploy to Azure VM'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: SSH@0
                  displayName: 'Pull latest code and redeploy'
                  inputs:
                    sshEndpoint: 'automart-vm-ssh'
                    runOptions: 'commands'
                    commands: |
                      cd ~/automart
                      git pull origin main
                      docker compose up --build -d
                      sleep 15
                      docker compose ps
                    readyTimeout: '120000'

                - task: SSH@0
                  displayName: 'Verify all services healthy'
                  inputs:
                    sshEndpoint: 'automart-vm-ssh'
                    runOptions: 'commands'
                    commands: |
                      sleep 10
                      echo "Checking service health..."
                      curl -sf http://localhost:3001/health && echo "product-service healthy" || echo "product-service not ready"
                      curl -sf http://localhost:3002/health && echo "order-service healthy"   || echo "order-service not ready"
                      curl -sf http://localhost:3003/health && echo "inventory-service healthy" || echo "inventory-service not ready"
                      curl -sf http://localhost:3004/health && echo "user-service healthy"    || echo "user-service not ready"
                      curl -sf http://localhost:3005/health && echo "payment-service healthy" || echo "payment-service not ready"
                      curl -sf http://localhost:3006/health && echo "listing-service healthy" || echo "listing-service not ready"
                      curl -sf http://localhost:80 && echo "frontend healthy" || echo "frontend not ready"
                      echo "AutoMart deployed successfully at http://20.55.249.106"
                    readyTimeout: '60000'