version: '3.8'

services:
  product-service:
    build: ./services/product-service
    container_name: automart-product
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI_PRODUCTS}
      JWT_SECRET: ${JWT_SECRET}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL}
    restart: unless-stopped
    networks:
      - automart-network

  order-service:
    build: ./services/order-service
    container_name: automart-order
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI_ORDERS}
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL}
    restart: unless-stopped
    networks:
      - automart-network

  inventory-service:
    build: ./services/inventory-service
    container_name: automart-inventory
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI_INVENTORY}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    networks:
      - automart-network

  user-service:
    build: ./services/user-service
    container_name: automart-user
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      MONGO_URI: ${MONGO_URI_USERS}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    networks:
      - automart-network

  payment-service:
    build: ./services/payment-service
    container_name: automart-payment
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      MONGO_URI: ${MONGO_URI_PAYMENTS}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    networks:
      - automart-network

  listing-service:
    build: ./services/listing-service
    container_name: automart-listing
    ports:
      - '3006:3006'
    environment:
      PORT: 3006
      MONGO_URI: ${MONGO_URI_LISTINGS}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
    restart: unless-stopped
    networks:
      - automart-network

  frontend:
    build: ./frontend
    container_name: automart-frontend
    ports:
      - '80:80'
    depends_on:
      - product-service
      - user-service
      - listing-service
    restart: unless-stopped
    networks:
      - automart-network

networks:
  automart-network:
    driver: bridge

