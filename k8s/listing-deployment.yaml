---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: listing-service
  namespace: automart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: listing-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: listing-service
    spec:
      containers:
        - name: listing-service
          image: automartacr.azurecr.io/listing-service:latest
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: '3006'
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: automart-config
                  key: NODE_ENV
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: automart-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: automart-secrets
                  key: JWT_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: automart-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: automart-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: automart-secrets
                  key: CLOUDINARY_API_SECRET
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: automart-config
                  key: PRODUCT_SERVICE_URL
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: listing-service
  namespace: automart
spec:
  selector:
    app: listing-service
  ports:
    - port: 3006
      targetPort: 3006
  type: ClusterIP