server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50M;

  location /api/products {
    proxy_pass http://product-service:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/orders {
    proxy_pass http://order-service:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/inventory {
    proxy_pass http://inventory-service:3003;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/users {
    proxy_pass http://user-service:3004;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/payments {
    proxy_pass http://payment-service:3005;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/listings {
    proxy_pass http://listing-service:3006;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control 'public, immutable';
  }
}
